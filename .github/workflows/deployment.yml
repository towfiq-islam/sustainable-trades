name: Production Deploy (Next.js VPS)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            nvm use 24 || nvm install 24

            export PATH=$PATH:/home/sustainabletrades/.nvm/versions/node/v24.15.0/bin

            cd ${{ secrets.VPS_PATH }}

            # ✅ ensure clean build state
            rm -rf .next

            # ✅ pull latest code safely
            git fetch origin main
            git reset --hard origin/main

            # (optional but recommended)
            git clean -fd

            # env file
            echo "NEXT_PUBLIC_SITE_URL=https://melissabooth123.thewarriors.team" > .env

            # install dependencies cleanly
            npm ci || npm install

            # build production
            NODE_ENV=production npm run build

            # start / restart app safely
            pm2 start ecosystem.config.js --env production || pm2 restart ecosystem.config.js

            pm2 save
