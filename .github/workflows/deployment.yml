name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

         script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          nvm use 24 || nvm install 24

          export PATH=$PATH:/home/sustainabletrades/.nvm/versions/node/v22.22.3/bin/pm2

          cd /home/sustainabletrades/htdocs/sustainabletrades.org

          rm -rf .next

          npm install

          NODE_TLS_REJECT_UNAUTHORIZED=0 npm run build

          pm2 restart sustainable-trades || pm2 start npm --name "sustainable-trades" -- start

          pm2 save
