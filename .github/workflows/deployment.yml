name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            nvm use 24 || nvm install 24

            export PATH=$PATH:/home/sustainabletrades/.nvm/versions/node/v24.15.0/bin

            cd /home/sustainabletrades/htdocs/sustainabletrades.org

            rm -rf .next

            git fetch origin
            git reset --hard origin/main

            npm install

            NODE_TLS_REJECT_UNAUTHORIZED=0 npm run build

            pm2 restart sustainabletrades || pm2 start npm --name "sustainabletrades" -- start

            pm2 save
