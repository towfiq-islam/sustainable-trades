name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm use 24 || nvm install 24

            APP_DIR="${{ secrets.VPS_PATH }}"
            TMP_DIR="/tmp/nextjs-build-check"

            rm -rf "$TMP_DIR"

            git clone --depth=1 \
              --branch main \
              https://github.com/${{ github.repository }}.git \
              "$TMP_DIR"

            cd "$TMP_DIR"

            npm ci
            npm run build

            cd "$APP_DIR"

            git fetch origin
            git reset --hard origin/main

            npm ci

            pm2 reload sustainable-trades --update-env
            pm2 save

            rm -rf "$TMP_DIR"

            echo "Deployment completed successfully."
